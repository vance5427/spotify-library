<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vance's Spotify Library</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#121212;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
a{color:#1DB954;text-decoration:none}
a:hover{text-decoration:underline}
.header{background:#181818;padding:20px;text-align:center;border-bottom:1px solid #282828}
.header h1{font-size:1.5em;margin-bottom:8px}
.stats{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;font-size:0.85em;color:#b3b3b3}
.stats span{background:#282828;padding:4px 12px;border-radius:12px}
.tabs{display:flex;background:#181818;border-bottom:1px solid #282828;overflow-x:auto}
.tab{padding:12px 24px;cursor:pointer;color:#b3b3b3;border-bottom:2px solid transparent;white-space:nowrap;user-select:none}
.tab:hover{color:#fff}
.tab.active{color:#1DB954;border-bottom-color:#1DB954}
.content{max-width:1400px;margin:0 auto;padding:16px}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.controls input,.controls select{background:#282828;border:1px solid #404040;color:#fff;padding:8px 12px;border-radius:4px;font-size:0.9em}
.controls input{flex:1;min-width:200px}
.controls select{min-width:120px}
table{width:100%;border-collapse:collapse}
th{background:#181818;color:#b3b3b3;text-align:left;padding:8px;font-size:0.8em;cursor:pointer;position:sticky;top:0;user-select:none}
th:hover{color:#1DB954}
td{padding:6px 8px;border-bottom:1px solid #282828;font-size:0.85em;vertical-align:middle}
tr:hover{background:#333}
tr{cursor:pointer}
.art-cell img{width:40px;height:40px;border-radius:4px;display:block}
.artist-link{color:#b3b3b3;cursor:pointer}
.artist-link:hover{color:#1DB954;text-decoration:underline}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:16px;align-items:center}
.pagination button{background:#282828;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer}
.pagination button:hover{background:#1DB954}
.pagination button:disabled{opacity:0.3;cursor:default}
.pagination button:disabled:hover{background:#282828}
.page-info{color:#b3b3b3;font-size:0.85em}
.filter-tag{background:#1DB954;color:#000;padding:4px 10px;border-radius:12px;font-size:0.8em;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.filter-tag:hover{background:#1ed760}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#282828;border-radius:12px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
.modal-close{position:absolute;top:12px;right:16px;font-size:1.5em;cursor:pointer;color:#b3b3b3;background:none;border:none}
.modal-close:hover{color:#fff}
.modal-art{width:250px;height:250px;border-radius:8px;margin:0 auto 16px;display:block}
.modal-title{font-size:1.3em;text-align:center;margin-bottom:4px}
.modal-subtitle{text-align:center;color:#b3b3b3;margin-bottom:16px}
.modal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.modal-field{background:#333;padding:8px;border-radius:6px}
.modal-field label{font-size:0.7em;color:#b3b3b3;display:block}
.modal-field span{font-size:0.9em}
.modal-links{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.modal-links a{background:#333;padding:6px 14px;border-radius:16px;font-size:0.85em;color:#fff}
.modal-links a:hover{background:#1DB954;color:#000;text-decoration:none}
/* Grid views */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.card{background:#282828;border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:background 0.2s}
.card:hover{background:#333}
.card img{border-radius:4px;margin-bottom:8px}
.card .name{font-size:0.9em;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .sub{font-size:0.75em;color:#b3b3b3}
.artist-card img{border-radius:50%}
.playlist-card{cursor:default}
.playlist-card a{display:block}
.section-title{font-size:0.9em;color:#b3b3b3;margin:16px 0 8px;border-bottom:1px solid #333;padding-bottom:4px}
/* DJ Mixer */
.dj-container{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.dj-panel{background:#282828;border-radius:8px;padding:16px}
.dj-panel h3{margin-bottom:12px;color:#1DB954}
.dj-song-info{background:#333;border-radius:6px;padding:12px;margin:12px 0}
.dj-song-info .title{font-weight:bold}
.dj-song-info .meta{color:#b3b3b3;font-size:0.85em}
.compat-list{max-height:400px;overflow-y:auto}
.compat-item{display:flex;align-items:center;gap:8px;padding:8px;border-bottom:1px solid #333;cursor:pointer}
.compat-item:hover{background:#404040}
.compat-badge{padding:2px 8px;border-radius:10px;font-size:0.7em;font-weight:bold}
.compat-perfect{background:#1DB954;color:#000}
.compat-good{background:#f0a500;color:#000}
/* Mobile */
@media(max-width:768px){
  .dj-container{grid-template-columns:1fr}
  table,thead,tbody,th,td,tr{display:block}
  thead{display:none}
  tr{background:#282828;margin-bottom:8px;border-radius:8px;padding:12px;border-bottom:none}
  td{padding:2px 0;border:none;font-size:0.85em;display:flex;justify-content:space-between}
  td:before{content:attr(data-label);color:#b3b3b3;font-weight:bold;margin-right:8px}
  .art-cell{display:none}
  .controls{flex-direction:column}
  .controls input,.controls select{width:100%}
  .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}
.hidden{display:none!important}
</style>
</head>

var page=0,perPage=100,filtered=D.slice(),artistFilter='',albumFilter='';
function init(){
  // Build filter options
  var decades={},genres={},langs={},months={};
  D.forEach(function(s){
    if(s.y){var dec=s.y.substring(0,3)+'0s';decades[dec]=1;}
    if(s.g){s.g.split(', ').forEach(function(gg){genres[gg]=(genres[gg]||0)+1;});}
    if(s.lang)langs[s.lang]=(langs[s.lang]||0)+1;
    if(s.am)months[s.am]=1;
  });
  var decSel=document.getElementById('decade-filter');
  Object.keys(decades).sort().reverse().forEach(function(d){var o=document.createElement('option');o.value=d;o.textContent=d;decSel.appendChild(o);});
  var genSel=document.getElementById('genre-filter');
  var genArr=Object.entries(genres).sort(function(a,b){return b[1]-a[1];}).slice(0,50);
  genArr.forEach(function(g){var o=document.createElement('option');o.value=g[0];o.textContent=g[0]+' ('+g[1]+')';genSel.appendChild(o);});
  var langSel=document.getElementById('lang-filter');
  Object.entries(langs).sort(function(a,b){return b[1]-a[1];}).forEach(function(l){var o=document.createElement('option');o.value=l[0];o.textContent=l[0]+' ('+l[1]+')';langSel.appendChild(o);});
  var monSel=document.getElementById('month-filter');
  Object.keys(months).sort().reverse().forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;monSel.appendChild(o);});
  applyFilters();
  buildArtists();
  buildAlbums();
  buildPlaylists();
}
function applyFilters(){
  var q=document.getElementById('search').value.toLowerCase();
  var dec=document.getElementById('decade-filter').value;
  var gen=document.getElementById('genre-filter').value;
  var lang=document.getElementById('lang-filter').value;
  var mon=document.getElementById('month-filter').value;
  filtered=D.filter(function(s){
    if(q){var hay=[s.t,s.a,s.al,s.g||'',s.lang||'',s.ctry||''].join(' ').toLowerCase();if(hay.indexOf(q)<0)return false;}
    if(dec&&(!s.y||s.y.substring(0,3)+'0s'!==dec))return false;
    if(gen&&(!s.g||s.g.indexOf(gen)<0))return false;
    if(lang&&s.lang!==lang)return false;
    if(mon&&s.am!==mon)return false;
    if(artistFilter&&s.a!==artistFilter)return false;
    if(albumFilter&&s.al!==albumFilter)return false;
    return true;
  });
  var sort=document.getElementById('sort-select').value;
  var parts=sort.split('-'),key=parts[0],dir=parts[1];
  filtered.sort(function(a,b){
    var va=a[key],vb=b[key];
    if(va==null)va=dir==='asc'?Infinity:-Infinity;
    if(vb==null)vb=dir==='asc'?Infinity:-Infinity;
    if(typeof va==='string')va=va.toLowerCase();
    if(typeof vb==='string')vb=vb.toLowerCase();
    if(va<vb)return dir==='asc'?-1:1;
    if(va>vb)return dir==='asc'?1:-1;
    return 0;
  });
  page=0;
  renderTable();
  renderActiveFilters();
}
function renderActiveFilters(){
  var el=document.getElementById('active-filters');
  var html='';
  if(artistFilter)html+='<span class="filter-tag" onclick="clearArtistFilter()">Artist: '+esc(artistFilter)+' &times;</span> ';
  if(albumFilter)html+='<span class="filter-tag" onclick="clearArtistFilter()">Album: '+esc(albumFilter)+' &times;</span> ';
  el.innerHTML=html;
}
function filterByArtist(nameOrEl){var name=typeof nameOrEl==='string'?nameOrEl:(nameOrEl&&nameOrEl.dataset?nameOrEl.dataset.v:nameOrEl);artistFilter=name;albumFilter='';switchTab('songs');applyFilters();}
function filterByAlbum(nameOrEl){var name=typeof nameOrEl==='string'?nameOrEl:(nameOrEl&&nameOrEl.dataset?nameOrEl.dataset.v:nameOrEl);albumFilter=name;artistFilter='';switchTab('songs');applyFilters();}
function clearArtistFilter(){artistFilter='';albumFilter='';applyFilters();}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function renderTable(){
  var start=page*perPage,end=Math.min(start+perPage,filtered.length);
  var html='<table><thead><tr><th onclick="setSort(\'n\')">#</th><th>Art</th><th onclick="setSort(\'t\')">Title</th><th onclick="setSort(\'a\')">Artist</th><th>Album</th><th>Genre</th><th>Key</th><th onclick="setSort(\'b\')">BPM</th><th onclick="setSort(\'dc\')">Dance</th><th onclick="setSort(\'ac\')">Acoustic</th><th onclick="setSort(\'y\')">Year</th><th>Dur</th><th onclick="setSort(\'ad\')">Added</th><th>Lang</th><th>Country</th></tr></thead><tbody>';
  for(var i=start;i<end;i++){
    var s=filtered[i];
    var spLink=s.u?spUrl(s.u):'#';
    var keyCam=(s.k||'')+(s.cm?' / '+s.cm:'');
    html+='<tr onclick="showModal('+s.n+')">';
    html+='<td data-label="#">'+s.n+'</td>';
    html+='<td class="art-cell">'+artImg(s,56)+'</td>';
    html+='<td data-label="Title"><a href="'+spLink+'" target="_blank" onclick="event.stopPropagation()">'+esc(s.t)+'</a></td>';
    html+='<td data-label="Artist"><span class="artist-link" onclick="event.stopPropagation();filterByArtist(this.dataset.v)" data-v="'+esc(s.a)+'">'+esc(s.a)+'</span></td>';
    html+='<td data-label="Album">'+esc(s.al)+'</td>';
    html+='<td data-label="Genre">'+esc(s.g||'')+'</td>';
    html+='<td data-label="Key">'+keyCam+'</td>';
    html+='<td data-label="BPM">'+(s.b||'')+'</td>';
    html+='<td data-label="Dance">'+(s.dc!=null?s.dc:'')+'</td>';
    html+='<td data-label="Acoustic">'+(s.ac!=null?s.ac:'')+'</td>';
    html+='<td data-label="Year">'+(s.y||'')+'</td>';
    html+='<td data-label="Dur">'+(s.d||'')+'</td>';
    html+='<td data-label="Added">'+(s.ad||'')+'</td>';
    html+='<td data-label="Lang">'+(s.lang||'')+'</td>';
    html+='<td data-label="Country">'+(s.ctry||'')+'</td>';
    html+='</tr>';
  }
  html+='</tbody></table>';
  document.getElementById('song-table-wrap').innerHTML=html;
  var totalPages=Math.ceil(filtered.length/perPage);
  var phtml='<button onclick="changePage(-1)"'+(page===0?' disabled':'')+'>← Prev</button>';
  phtml+='<span class="page-info">Page '+(page+1)+' of '+totalPages+' ('+filtered.length+' songs)</span>';
  phtml+='<button onclick="changePage(1)"'+(page>=totalPages-1?' disabled':'')+'>Next →</button>';
  document.getElementById('pagination').innerHTML=phtml;
}
function changePage(d){page+=d;renderTable();window.scrollTo(0,200);}
function setSort(key){
  var sel=document.getElementById('sort-select');
  var cur=sel.value;
  if(cur.startsWith(key+'-')){
    sel.value=key+'-'+(cur.endsWith('asc')?'desc':'asc');
  }else{
    // find matching option
    var opts=sel.options;
    for(var i=0;i<opts.length;i++){if(opts[i].value.startsWith(key+'-')){sel.value=opts[i].value;break;}}
  }
  applyFilters();
}
function showModal(num){
  var s=D.find(function(x){return x.n===num;});
  if(!s)return;
  var imgSrc=s.ix?coverUrl(s.ix,500):(s.i?coverUrl(s.i,250):'');
  var html='';
  if(imgSrc)html+='<img class="modal-art" src="'+imgSrc+'" loading="lazy" alt="">';
  html+='<div class="modal-title">'+esc(s.t)+'</div>';
  html+='<div class="modal-subtitle">'+esc(s.a)+' — '+esc(s.al)+'</div>';
  html+='<div class="modal-grid">';
  var fields=[
    ['BPM',s.b],['Key / Camelot',(s.k||'')+(s.cm?' / '+s.cm:'')],['Genre',s.g],['Duration',s.d],
    ['Song #',s.n],['Added',s.ad],['Released',s.y],['Danceability',s.dc!=null?s.dc+'/100':''],
    ['Acousticness',s.ac!=null?s.ac+'/100':''],['Time Signature',s.ts],['Language',s.lang],
    ['Country',s.ctry],['Explicit',s.ex?'Yes':'No']
  ];
  fields.forEach(function(f){
    if(f[1]!=null&&f[1]!=='')html+='<div class="modal-field"><label>'+f[0]+'</label><span>'+esc(String(f[1]))+'</span></div>';
  });
  html+='</div>';
  html+='<div class="modal-links">';
  if(s.u)html+='<a href="'+spUrl(s.u)+'" target="_blank">🎵 Spotify</a>';
  html+='<a href="https://www.google.com/search?q='+encodeURIComponent(s.t+' '+s.a)+'" target="_blank">🔍 Google</a>';
  html+='<a href="https://en.wikipedia.org/wiki/Special:Search?search='+encodeURIComponent(s.t+' '+s.a)+'" target="_blank">📖 Wikipedia</a>';
  html+='<a href="https://www.youtube.com/results?search_query='+encodeURIComponent(s.t+' '+s.a)+'" target="_blank">▶️ YouTube</a>';
  html+='<a href="https://genius.com/search?q='+encodeURIComponent(s.t+' '+s.a)+'" target="_blank">📝 Genius Lyrics</a>';
  if(s.b||s.cm)html+='<a href="#" onclick="event.preventDefault();closeModal();switchTab(\'dj\');djSelectSong('+s.n+')">🎧 DJ Mix</a>';
  html+='</div>';
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
function switchTab(name){
  var allTabs=document.querySelectorAll('.tab');
  allTabs.forEach(function(t,i){
    var names=['songs','dj','artists','albums','playlists'];
    t.classList.toggle('active',names[i]===name);
  });
  ['songs','dj','artists','albums','playlists'].forEach(function(n){
    var el=document.getElementById(n+'-tab');
    if(el)el.classList.toggle('hidden',n!==name);
  });
}
// Artists tab
function buildArtists(){
  var counts={},arts={};
  D.forEach(function(s){
    var a=s.a;
    counts[a]=(counts[a]||0)+1;
    if(s.ai&&!arts[a])arts[a]=s.ai;
  });
  var sorted=Object.entries(counts).sort(function(a,b){return b[1]-a[1];});
  var html='<div class="controls"><input type="text" id="artist-search" placeholder="Search artists..." oninput="filterArtistCards()"></div><div class="grid" id="artist-grid">';
  sorted.forEach(function(e){
    var name=e[0],cnt=e[1],hash=arts[name];
    var img=hash?artistUrl(hash):'';
    html+='<div class="card artist-card" data-name="'+esc(name).toLowerCase()+'" onclick="filterByArtist(this.dataset.v)" data-v="'+esc(name)+'">';
    if(img)html+='<img src="'+img+'" width="80" height="80" loading="lazy" alt="">';
    else html+='<div style="width:80px;height:80px;background:#282828;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto">🎤</div>';
    html+='<div class="name" title="'+esc(name)+'">'+esc(name)+'</div>';
    html+='<div class="sub">'+cnt+' song'+(cnt>1?'s':'')+'</div></div>';
  });
  html+='</div>';
  document.getElementById('artists-tab').innerHTML=html;
}
function filterArtistCards(){
  var q=document.getElementById('artist-search').value.toLowerCase();
  document.querySelectorAll('#artist-grid .card').forEach(function(c){
    c.style.display=(!q||c.getAttribute('data-name').indexOf(q)>=0)?'':'none';
  });
}
// Albums tab
function buildAlbums(){
  var albums={};
  D.forEach(function(s){
    var key=s.al+'|||'+s.a;
    if(!albums[key])albums[key]={name:s.al,artist:s.a,year:s.y,hash:s.i,count:0};
    albums[key].count++;
  });
  var sorted=Object.values(albums).sort(function(a,b){return b.count-a.count;});
  var html='<div class="controls"><input type="text" id="album-search" placeholder="Search albums..." oninput="filterAlbumCards()"></div><div class="grid" id="album-grid">';
  sorted.forEach(function(al){
    var img=al.hash?coverUrl(al.hash,250):'';
    html+='<div class="card" data-name="'+esc(al.name).toLowerCase()+' '+esc(al.artist).toLowerCase()+'" onclick="filterByAlbum(this.dataset.v)" data-v="'+esc(al.name)+'">';
    if(img)html+='<img src="'+img+'" width="120" height="120" loading="lazy" alt="">';
    else html+='<div style="width:120px;height:120px;background:#282828;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto">💿</div>';
    html+='<div class="name" title="'+esc(al.name)+'">'+esc(al.name)+'</div>';
    html+='<div class="sub">'+esc(al.artist)+'</div>';
    html+='<div class="sub">'+(al.year||'')+' · '+al.count+' song'+(al.count>1?'s':'')+'</div></div>';
  });
  html+='</div>';
  document.getElementById('albums-tab').innerHTML=html;
}
function filterAlbumCards(){
  var q=document.getElementById('album-search').value.toLowerCase();
  document.querySelectorAll('#album-grid .card').forEach(function(c){
    c.style.display=(!q||c.getAttribute('data-name').indexOf(q)>=0)?'':'none';
  });
}
// Playlists tab
function buildPlaylists(){
  var own=[],other=[];
  PL.forEach(function(p){
    if(p.owner==='Vance Wood')own.push(p);else other.push(p);
  });
  var html='';
  if(own.length){
    html+='<div class="section-title">My Playlists ('+own.length+')</div><div class="grid">';
    own.forEach(function(p){html+=playlistCard(p);});
    html+='</div>';
  }
  if(other.length){
    html+='<div class="section-title">Other Playlists ('+other.length+')</div><div class="grid">';
    other.forEach(function(p){html+=playlistCard(p);});
    html+='</div>';
  }
  document.getElementById('playlists-tab').innerHTML=html;
}
function playlistCard(p){
  var img=p.image||'';
  var h='<div class="card playlist-card"><a href="'+p.url+'" target="_blank">';
  if(img)h+='<img src="'+img+'" width="140" height="140" loading="lazy" alt="">';
  h+='<div class="name" title="'+esc(p.name)+'">'+esc(p.name)+'</div>';
  h+='<div class="sub">'+esc(p.owner)+'</div>';
  h+='<div class="sub">'+p.tracks+' tracks</div>';
  h+='</a></div>';
  return h;
}
// DJ Mixer
var djSelected=null;
function djSearch(){
  var q=document.getElementById('dj-search').value.toLowerCase();
  if(q.length<2){document.getElementById('dj-results').innerHTML='';return;}
  var matches=D.filter(function(s){return(s.t+' '+s.a).toLowerCase().indexOf(q)>=0;}).slice(0,20);
  var html='';
  matches.forEach(function(s){
    html+='<div class="compat-item" onclick="djSelectSong('+s.n+')">'+artImg(s,56)+'<div><div style="font-weight:bold">'+esc(s.t)+'</div><div style="color:#b3b3b3;font-size:0.8em">'+esc(s.a)+' · '+(s.b||'?')+' BPM · '+(s.cm||'?')+'</div></div></div>';
  });
  document.getElementById('dj-results').innerHTML=html;
}
function djSelectSong(num){
  var s=D.find(function(x){return x.n===num;});
  if(!s)return;
  djSelected=s;
  document.getElementById('dj-sel-title').textContent=s.t;
  document.getElementById('dj-sel-meta').textContent=s.a+' · '+(s.b||'?')+' BPM · '+(s.cm||'?')+' · '+(s.k||'?');
  document.getElementById('dj-selected').classList.remove('hidden');
  document.getElementById('dj-results').innerHTML='';
  document.getElementById('dj-search').value='';
  findCompatible(s);
}
function camelotCompat(cm1,cm2){
  if(!cm1||!cm2)return null;
  if(cm1===cm2)return'perfect';
  var n1=parseInt(cm1),l1=cm1.slice(-1);
  var n2=parseInt(cm2),l2=cm2.slice(-1);
  if(l1===l2){var diff=Math.abs(n1-n2);if(diff===1||(n1===1&&n2===12)||(n1===12&&n2===1))return'good';}
  if(n1===n2&&l1!==l2)return'good';
  return null;
}
function findCompatible(s){
  if(!s.b||!s.cm){document.getElementById('dj-compat').innerHTML='<p style="color:#b3b3b3">Selected track needs BPM and key data for mixing</p>';return;}
  var results=[];
  D.forEach(function(t){
    if(t.n===s.n||!t.b||!t.cm)return;
    if(Math.abs(t.b-s.b)>10)return;
    var compat=camelotCompat(s.cm,t.cm);
    if(!compat)return;
    results.push({song:t,compat:compat,bpmDiff:Math.abs(t.b-s.b)});
  });
  results.sort(function(a,b){
    if(a.compat==='perfect'&&b.compat!=='perfect')return-1;
    if(b.compat==='perfect'&&a.compat!=='perfect')return 1;
    return a.bpmDiff-b.bpmDiff;
  });
  var html='<p style="color:#b3b3b3;margin-bottom:8px">'+results.length+' compatible tracks found</p>';
  results.forEach(function(r){
    var t=r.song;
    html+='<div class="compat-item" onclick="showModal('+t.n+')">';
    html+=artImg(t,56);
    html+='<span class="compat-badge compat-'+r.compat+'">'+r.compat+'</span>';
    html+='<div><div style="font-weight:bold">'+esc(t.t)+'</div>';
    html+='<div style="color:#b3b3b3;font-size:0.8em">'+esc(t.a)+' · '+t.b+' BPM · '+t.cm+'</div></div></div>';
  });
  document.getElementById('dj-compat').innerHTML=html;
}
init();
</script>
